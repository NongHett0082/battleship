<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚓ Battleship Multiplayer</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" integrity="sha384-mZLF4UVrpi/QTWPA7BjNPEnkIfRFn4ZEO3Qt/HFklTJBj/gBOV8G3HcKn4NfQblz" crossorigin="anonymous"></script>
  <style>
    :root { --bg:#0a1628; --card:#152238; --accent:#4ade80; --accent-hover:#22c55e; --text:#e2e8f0; --text-dim:#94a3b8; --danger:#f87171; --warning:#fbbf24; --input-bg:#1e3a5f; --border:#334155; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans Thai',sans-serif; background:linear-gradient(135deg,var(--bg),#0f1f3d); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
    .container { max-width:600px; width:100%; margin:0 auto; }
    header { text-align:center; padding:24px 0; margin-bottom:20px; }
    h1 { font-size:2rem; font-weight:700; margin-bottom:4px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .subtitle { color:var(--text-dim); font-size:0.95rem; }
    .card { background:var(--card); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid var(--border); }
    .card h2 { font-size:1.25rem; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .form-group { margin-bottom:14px; }
    label { display:block; margin-bottom:6px; font-size:0.9rem; color:var(--text-dim); }
    input[type="text"] { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); font-size:1rem; outline:none; }
    input:focus { border-color:var(--accent); }
    .player-count { display:flex; gap:8px; margin-top:8px; }
    .player-count button { flex:1; padding:10px; border:2px solid var(--border); background:var(--input-bg); color:var(--text); border-radius:8px; cursor:pointer; font-weight:500; }
    .player-count button.active, .player-count button:hover { border-color:var(--accent); background:rgba(74,222,128,0.15); color:var(--accent); }
    .btn { width:100%; padding:14px; background:var(--accent); color:#0a1628; border:none; border-radius:12px; font-size:1.05rem; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn:hover { background:var(--accent-hover); }
    .btn:disabled { background:var(--border); color:var(--text-dim); cursor:not-allowed; opacity:0.6; }
    .btn-secondary { background:var(--input-bg); color:var(--text); border:1px solid var(--border); }
    .btn-danger { background:var(--danger); color:white; }
    .room-code-display { text-align:center; padding:16px; background:rgba(74,222,128,0.1); border-radius:12px; margin:12px 0; border:1px dashed var(--accent); }
    .room-code { font-size:2rem; font-weight:700; letter-spacing:4px; color:var(--accent); font-family:monospace; margin:8px 0; }
    .copy-btn { background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:6px 12px; border-radius:6px; font-size:0.85rem; cursor:pointer; margin-top:8px; }
    .copy-btn:hover { border-color:var(--accent); color:var(--accent); }
    .players-list { margin:16px 0; }
    .player-item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--input-bg); border-radius:8px; margin-bottom:8px; }
    .player-name { display:flex; align-items:center; gap:8px; font-weight:500; }
    .player-badge { font-size:0.75rem; padding:2px 8px; border-radius:20px; background:var(--accent); color:#0a1628; font-weight:600; }
    .player-badge.ready { background:var(--warning); }
    .status-dot { width:10px; height:10px; border-radius:50%; background:var(--text-dim); }
    .status-dot.online { background:var(--accent); box-shadow:0 0 8px var(--accent); }
    .waiting-text { text-align:center; color:var(--text-dim); padding:12px; font-style:italic; }
    .error-msg { background:rgba(248,113,113,0.15); border:1px solid var(--danger); color:#fecaca; padding:10px 14px; border-radius:8px; margin-bottom:12px; display:none; }
    .error-msg.show { display:block; }
    .hidden { display:none !important; }
    .divider { text-align:center; color:var(--text-dim); margin:8px 0 16px; }
    .ready-btn { background:var(--accent); color:#0a1628; border:none; padding:6px 16px; border-radius:20px; font-size:0.85rem; font-weight:600; cursor:pointer; }
    .ready-btn:hover { background:var(--accent-hover); }
    .connection-status { text-align:center; padding:8px; border-radius:8px; margin-bottom:12px; font-size:0.85rem; }
    .connection-status.connected { background:rgba(74,222,128,0.2); color:var(--accent); }
    .connection-status.disconnected { background:rgba(248,113,113,0.2); color:var(--danger); }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>⚓ Battleship</h1><p class="subtitle">MULTIPLAYER · 2–10 PLAYERS</p></header>
    <div id="errorMsg" class="error-msg"></div>
    <div id="connectionStatus" class="connection-status disconnected">🔴 กำลังเชื่อมต่อ...</div>
    
    <div id="createSection" class="card">
      <h2>🏠 สร้างห้องใหม่</h2>
      <div class="form-group">
        <label>ชื่อของคุณ</label>
        <input type="text" id="createName" placeholder="ใส่ชื่อผู้เล่น..." maxlength="20">
      </div>
      <div class="form-group">
        <label>จำนวนผู้เล่นสูงสุด</label>
        <div class="player-count">
          <button data-max="2" class="active">2</button>
          <button data-max="4">4</button>
          <button data-max="6">6</button>
          <button data-max="10">10</button>
        </div>
      </div>
      <button id="createBtn" class="btn">+ สร้างห้อง</button>
    </div>
    
    <div class="divider">หรือ</div>
    
    <div id="joinSection" class="card">
      <h2>🚪 เข้าร่วมห้อง</h2>
      <div class="form-group">
        <label>รหัสห้อง (4 ตัว)</label>
        <input type="text" id="joinCode" placeholder="ABCD" maxlength="4" style="text-transform:uppercase;text-align:center;letter-spacing:4px;">
      </div>
      <div class="form-group">
        <label>ชื่อของคุณ</label>
        <input type="text" id="joinName" placeholder="ใส่ชื่อผู้เล่น..." maxlength="20">
      </div>
      <button id="joinBtn" class="btn">→ เข้าร่วม</button>
    </div>
    
    <div id="lobbySection" class="card hidden">
      <h2>🎮 ห้อง: <span id="lobbyRoomCode" style="color:var(--accent);font-family:monospace;"></span></h2>
      <div class="room-code-display">
        <div>แชร์รหัสนี้ให้เพื่อน</div>
        <div id="displayRoomCode" class="room-code">----</div>
        <button id="copyCodeBtn" class="copy-btn">📋 ค๊อปปี้รหัส</button>
      </div>
      <div class="players-list">
        <h3 style="margin-bottom:10px;">ผู้เล่นในห้อง:</h3>
        <div id="playersList"><div class="waiting-text">กำลังโหลด...</div></div>
      </div>
      <div id="waitingText" class="waiting-text">รอผู้เล่นเพิ่มเติม...</div>
      <button id="startBtn" class="btn hidden" disabled>▶ เริ่มเกม!</button>
      <button id="leaveBtn" class="btn btn-secondary btn-danger" style="margin-top:8px;">❌ ออกจากห้อง</button>
    </div>
  </div>

  <script src="/js/socketClient.js"></script>
  <script>
    (function() {
      'use strict';
      const $ = id => document.getElementById(id);
      const errorMsg = $('errorMsg'), connectionStatus = $('connectionStatus');
      const createSection = $('createSection'), joinSection = $('joinSection'), lobbySection = $('lobbySection');
      const createName = $('createName'), joinCode = $('joinCode'), joinName = $('joinName');
      const createBtn = $('createBtn'), joinBtn = $('joinBtn'), startBtn = $('startBtn'), leaveBtn = $('leaveBtn'), copyCodeBtn = $('copyCodeBtn');
      const lobbyRoomCode = $('lobbyRoomCode'), displayRoomCode = $('displayRoomCode'), playersList = $('playersList'), waitingText = $('waitingText');
      
      let currentRoomCode = null, currentPlayerName = null, maxPlayers = 2, isHost = false, amReady = false, mySocketId = null;
      
      function init() {
        setupEvents(); connectSocket(); loadSavedName();
      }
      
      function setupEvents() {
        document.querySelectorAll('.player-count button').forEach(btn => {
          btn.onclick = e => {
            document.querySelectorAll('.player-count button').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            maxPlayers = parseInt(e.currentTarget.dataset.max);
          };
        });
        createBtn.onclick = () => {
          const name = createName.value.trim();
          if (!validateName(name)) return;
          saveName(name); setLoading(createBtn, true);
          socketClient.createRoom(name, maxPlayers, res => {
            setLoading(createBtn, false);
            if (res && res.roomCode) enterLobby(res.roomCode, name, true);
            else if (res && res.error) showError(res.error);
          });
        };
        joinBtn.onclick = () => {
          const code = joinCode.value.trim().toUpperCase(), name = joinName.value.trim();
          if (!/^[A-Z0-9]{4}$/.test(code)) { showError('รหัสห้องต้องเป็น 4 ตัวอักษร/ตัวเลข'); return; }
          if (!validateName(name)) return;
          saveName(name); setLoading(joinBtn, true);
          socketClient.joinRoom(code, name, res => {
            setLoading(joinBtn, false);
            if (res && res.success) enterLobby(code, name, false);
            else if (res && res.error) showError(res.error);
          });
        };
        startBtn.onclick = () => { if (currentRoomCode) { setLoading(startBtn, true); socketClient.startSetup(currentRoomCode); } };
        leaveBtn.onclick = leaveLobby;
        copyCodeBtn.onclick = async () => {
          if (!currentRoomCode) return;
          try { await navigator.clipboard.writeText(currentRoomCode); copyCodeBtn.textContent = '✅ ค๊อปปี้แล้ว!'; setTimeout(() => copyCodeBtn.textContent = '📋 ค๊อปปี้รหัส', 2000); }
          catch { const t = document.createElement('textarea'); t.value = currentRoomCode; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); copyCodeBtn.textContent = '✅ ค๊อปปี้แล้ว!'; setTimeout(() => copyCodeBtn.textContent = '📋 ค๊อปปี้รหัส', 2000); }
        };
        joinCode.oninput = e => e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 4);
        createName.onkeypress = e => { if (e.key === 'Enter') createBtn.click(); };
        joinCode.onkeypress = e => { if (e.key === 'Enter') joinBtn.click(); };
        joinName.onkeypress = e => { if (e.key === 'Enter') joinBtn.click(); };
      }
      
      function connectSocket() {
        socketClient.connect();
        socketClient.on('connect', () => { mySocketId = socketClient.id; updateConnectionStatus(true); });
        socketClient.on('disconnect', reason => { updateConnectionStatus(false); if (currentRoomCode && reason !== 'io client disconnect') setTimeout(() => { if (currentRoomCode && currentPlayerName) socketClient.rejoinRoom(currentRoomCode, currentPlayerName); }, 1500); });
        socketClient.on('error', data => { showError(data.message || 'เกิดข้อผิดพลาด'); resetLoading(); });
        socketClient.on('roomState', data => {
          console.log('[Lobby] Received roomState:', data);
          if (currentRoomCode && data.roomCode !== currentRoomCode) return;
          updatePlayersList(data.players);
          const player = data.players.find(p => p.socketId === mySocketId);
          if (player && player.isHost) {
            isHost = true;
            if (data.status === 'waiting' && data.players.length >= 2) {
              startBtn.classList.remove('hidden');
              const allReady = data.players.every(p => p.ready);
              console.log('[Lobby] All players ready?', allReady, data.players.map(p => p.name + ':' + p.ready));
              startBtn.disabled = !allReady;
              waitingText.textContent = allReady ? 'ทุกคนพร้อมแล้ว! กดเริ่มเกม' : 'รอผู้เล่นเตรียมพร้อม...';
            }
          }
        });
        socketClient.on('setupPhaseStart', data => { if (data.roomCode === currentRoomCode) window.location.href = '/setup.html?room=' + currentRoomCode + '&name=' + encodeURIComponent(currentPlayerName); });
      }
      
      function updateConnectionStatus(connected) {
        connectionStatus.className = 'connection-status ' + (connected ? 'connected' : 'disconnected');
        connectionStatus.textContent = connected ? '🟢 เชื่อมต่อแล้ว' : '🔴 กำลังเชื่อมต่อ...';
      }
      
      function validateName(name) {
        if (!name) { showError('กรุณาใส่ชื่อผู้เล่น'); return false; }
        if (name.length < 2) { showError('ชื่อต้องมีความยาวอย่างน้อย 2 ตัวอักษร'); return false; }
        if (name.length > 20) { showError('ชื่อต้องไม่เกิน 20 ตัวอักษร'); return false; }
        return true;
      }
      
      function saveName(name) { try { localStorage.setItem('battleship_player_name', name); } catch(e) {} }
      function loadSavedName() { try { const s = localStorage.getItem('battleship_player_name'); if (s) { createName.value = s; joinName.value = s; } } catch(e) {} }
      
      function enterLobby(roomCode, playerName, host) {
        currentRoomCode = roomCode; currentPlayerName = playerName; isHost = host; amReady = false;
        lobbyRoomCode.textContent = roomCode; displayRoomCode.textContent = roomCode;
        createSection.classList.add('hidden'); joinSection.classList.add('hidden'); lobbySection.classList.remove('hidden');
        errorMsg.classList.remove('show');
        window.history.replaceState({}, '', window.location.pathname + '?room=' + roomCode);
        setTimeout(() => copyCodeBtn.focus(), 300);
      }
      
      function leaveLobby() {
        currentRoomCode = null; currentPlayerName = null; isHost = false; amReady = false;
        lobbySection.classList.add('hidden'); createSection.classList.remove('hidden'); joinSection.classList.remove('hidden');
        startBtn.classList.add('hidden'); playersList.innerHTML = '';
        window.history.replaceState({}, '', window.location.pathname);
      }
      
      function updatePlayersList(players) {
        console.log('[Lobby] Updating players:', players);
        console.log('[Lobby] Players ready status:', players.map(p => p.name + ':' + p.ready));
        
        if (!players || players.length === 0) { playersList.innerHTML = '<div class="waiting-text">ยังไม่มีผู้เล่น</div>'; return; }
        
        const myId = mySocketId || socketClient.id;
        console.log('[Lobby] My socket ID:', myId);
        
        playersList.innerHTML = players.map(p => {
          const isMe = p.socketId === myId;
          const isHostPlayer = p.isHost;
          
          console.log('[Lobby] Player:', p.name, '| SocketID:', p.socketId, '| Is me?', isMe, '| Ready?', p.ready);
          
          let readyBtn = '';
          if (p.ready) {
            readyBtn = '<span class="player-badge ready">พร้อม</span>';
          } else if (isMe && !amReady) {
            readyBtn = '<button class="ready-btn" onclick="window.markReady()">พร้อม</button>';
          } else if (isMe && amReady) {
            readyBtn = '<span style="color:var(--text-dim);font-size:0.85rem;">รอผู้อื่น...</span>';
          } else {
            readyBtn = '<span style="color:var(--text-dim);font-size:0.85rem;">รอ...</span>';
          }
          
          return '<div class="player-item">' +
            '<div class="player-name">' +
              '<span class="status-dot online"></span>' +
              escapeHtml(p.name) +
              (isHostPlayer ? '<span class="player-badge">HOST</span>' : '') +
              (isMe ? ' <span style="color:var(--accent);">(คุณ)</span>' : '') +
            '</div>' +
            readyBtn +
          '</div>';
        }).join('');
        
        console.log('[Lobby] Players list updated');
      }
      
      window.markReady = function() {
        console.log('[Lobby] Mark ready clicked');
        console.log('[Lobby] Current room:', currentRoomCode);
        console.log('[Lobby] Am ready?', amReady);
        
        if (!currentRoomCode || amReady) {
          console.log('[Lobby] Cannot mark ready - room:', currentRoomCode, 'ready:', amReady);
          return;
        }
        amReady = true;
        console.log('[Lobby] Setting amReady = true');
        console.log('[Lobby] Sending markReady for room:', currentRoomCode);
        socketClient.markReady(currentRoomCode);
      };
      
      function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('show'); setTimeout(() => errorMsg.classList.remove('show'), 4000); }
      function setLoading(btn, loading) {
        if (loading) { btn.dataset.originalText = btn.innerHTML; btn.innerHTML = '⏳ กำลังดำเนินการ...'; btn.disabled = true; }
        else { if (btn.dataset.originalText) { btn.innerHTML = btn.dataset.originalText; delete btn.dataset.originalText; } btn.disabled = false; }
      }
      function resetLoading() { [createBtn, joinBtn, startBtn].forEach(btn => { if (btn.disabled && btn.dataset.originalText) setLoading(btn, false); }); }
      function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
      
      const params = new URLSearchParams(window.location.search);
      const room = params.get('room'), name = params.get('name');
      if (room && name) { joinCode.value = room.toUpperCase(); joinName.value = name; setTimeout(() => { if (!currentRoomCode) joinBtn.click(); }, 500); }
      
      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
