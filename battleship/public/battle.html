<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship — Battle</title>
    
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/socketClient.js"></script>
    <style>
        :root{ --ocean:#0a1628;--deep:#0d1f3c;--panel:#111c33;--border:#1e3a5f;--accent:#f1c40f;--water:#1565c0; }
        *{ box-sizing:border-box; margin:0; padding:0; }
        body{ font-family:'Kanit',sans-serif; background:var(--ocean); color:white; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px 12px; background-image:radial-gradient(ellipse at 20% 20%,rgba(21,101,192,0.15) 0%,transparent 50%); }
        h1{ font-size:1.6rem; font-weight:700; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
        .sub{ font-family:'Share Tech Mono',monospace; color:#4a90b8; font-size:0.7rem; letter-spacing:3px; margin-bottom:16px; }

        /* TURN BANNER */
        #turn-banner{ width:100%; max-width:900px; padding:10px 20px; border-radius:10px; text-align:center; font-weight:700; font-size:1rem; margin-bottom:8px; background:#1a3a5c; border:1px solid var(--border); transition:background 0.3s; display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap; }
        #turn-banner.my-turn{ background:linear-gradient(135deg,#1e6e3a,#27ae60); border-color:#27ae60; animation:pulse 1.5s ease-in-out infinite; }
        #turn-banner.other-turn{ background:#1a2a3a; border-color:#1e3a5f; }
        @keyframes pulse{ 0%,100%{box-shadow:0 0 0 0 rgba(46,204,113,0.3)} 50%{box-shadow:0 0 0 8px rgba(46,204,113,0)} }
        #turn-text{ flex:1; min-width:160px; }

        /* BULLET BAR */
        #bullet-bar{ width:100%; max-width:900px; margin-bottom:14px; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
        .bullet-label{ font-family:'Share Tech Mono',monospace; font-size:0.72rem; color:#4a90b8; letter-spacing:2px; white-space:nowrap; }
        #bullets-display{ display:flex; gap:5px; flex-wrap:wrap; }
        .bullet-icon{ font-size:1.25rem; transition:transform 0.2s,opacity 0.3s; }
        .bullet-icon.spent{ opacity:0.18; transform:scale(0.75); }
        .bullet-maxinfo{ font-family:'Share Tech Mono',monospace; font-size:0.7rem; color:#555; margin-left:6px; }

        /* MAIN LAYOUT */
        .battle-wrap{ display:flex; flex-wrap:wrap; gap:16px; justify-content:center; align-items:flex-start; width:100%; max-width:1200px; }

        /* BOARDS */
        .board-section{ display:flex; flex-direction:column; align-items:center; gap:12px; }
        .board-title{ font-size:0.75rem; font-family:'Share Tech Mono',monospace; color:#4a90b8; letter-spacing:2px; text-transform:uppercase; text-align:center; }
        .board-wrapper{ background:var(--panel); padding:10px; border-radius:12px; border:1px solid var(--border); }
        .board-wrapper.target-board{ cursor:crosshair; }
        .board-wrapper.target-board.active{ border-color:var(--accent); box-shadow:0 0 16px rgba(241,196,15,0.3); }

        .grid{ display:grid; grid-template-columns:28px repeat(8,40px); gap:2px; }
        .cell{ width:40px; height:40px; background:var(--water); display:flex; align-items:center; justify-content:center; border-radius:3px; transition:filter 0.12s,transform 0.1s; position:relative; font-size:9px; }
        .target-board .cell{ cursor:crosshair; }
        .target-board .cell:hover{ filter:brightness(1.3); transform:scale(1.08); z-index:2; }
        .header-cell{ width:28px; height:40px; background:transparent; cursor:default; color:var(--accent); font-weight:700; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-family:'Share Tech Mono',monospace; }
        .top-header{ width:40px; height:28px; }

        .land{ background:#3a5c35!important; }
        .ship{ background:#0e2240!important; }
        .hit{ background:linear-gradient(135deg,#c0392b,#e74c3c)!important; }
        .miss{ background:linear-gradient(135deg,#1a3a5c,#2980b9)!important; }
        .hit::after{ content:'💥'; font-size:14px; }
        .miss::after{ content:'💧'; font-size:12px; }

        /* SIDE PANEL */
        .side-panel{ width:220px; display:flex; flex-direction:column; gap:12px; }
        .panel-card{ background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px; }
        .panel-card h3{ font-size:0.62rem; font-family:'Share Tech Mono',monospace; color:#4a90b8; letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; }

        /* TARGET SELECTOR */
        .target-btn{ width:100%; padding:9px 12px; margin-bottom:6px; border-radius:8px; border:2px solid transparent; background:#0d1f3c; cursor:pointer; display:flex; align-items:center; gap:8px; font-family:'Kanit',sans-serif; font-size:0.85rem; color:white; transition:all 0.2s; }
        .target-btn:hover{ border-color:rgba(255,255,255,0.3); filter:brightness(1.2); }
        .target-btn.selected{ border-color:var(--accent); background:#1a3a5c; box-shadow:0 0 8px rgba(241,196,15,0.3); }
        .target-btn.eliminated{ opacity:0.35; cursor:not-allowed; text-decoration:line-through; }
        .target-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }

        /* PLAYER STATUS LIST */
        .player-status-row{ display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; background:rgba(255,255,255,0.03); margin-bottom:4px; font-size:0.82rem; }
        .pdot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .pname{ flex:1; }
        .pelim{ text-decoration:line-through; opacity:0.4; }
        .pcurrent{ color:var(--accent); font-size:0.65rem; font-family:'Share Tech Mono',monospace; }

        /* LOG */
        #log-entries{ font-family:'Share Tech Mono',monospace; font-size:0.7rem; max-height:180px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; }
        .log-hit{ color:#e74c3c; }
        .log-miss{ color:#3498db; }
        .log-sunk{ color:var(--accent); font-weight:700; }
        .log-elim{ color:#9b59b6; font-weight:700; }
        .log-info{ color:#7f8c8d; }

        .btn{ padding:10px 14px; border:none; border-radius:8px; font-family:'Kanit',sans-serif; font-weight:600; font-size:0.85rem; cursor:pointer; transition:all 0.2s; color:white; width:100%; margin-top:4px; }
        .btn:hover{ filter:brightness(1.15); }
        .btn-danger{ background:linear-gradient(135deg,#922b21,#e74c3c); }
        .btn-endturn{ background:linear-gradient(135deg,#1a5276,#2980b9); }
        .btn-secondary{ background:linear-gradient(135deg,#1c2833,#2e4053); color:#aaa; }

        #toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#e74c3c; color:white; padding:10px 24px; border-radius:8px; font-size:0.9rem; display:none; z-index:9999; box-shadow:0 4px 16px rgba(0,0,0,0.4); }
        #toast.success{ background:#27ae60; }

        /* GAME OVER */
        #game-over-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; z-index:1000; align-items:center; justify-content:center; }
        #game-over-overlay.show{ display:flex; }
        .game-over-box{ background:var(--panel); border-radius:20px; padding:40px; text-align:center; border:2px solid var(--accent); box-shadow:0 0 40px rgba(241,196,15,0.3); }
        .game-over-box h2{ font-size:2rem; color:var(--accent); margin-bottom:8px; }
        .game-over-box p{ color:#bdc3c7; margin-bottom:20px; }
        .btn-home{ background:linear-gradient(135deg,#b7950b,#f1c40f); color:#000; font-weight:700; padding:12px 32px; border:none; border-radius:10px; font-family:'Kanit',sans-serif; font-size:1rem; cursor:pointer; }
    </style>
</head>
<body>
<h1>⚔ Battle Phase</h1>
<p class="sub">BATTLESHIP MULTIPLAYER</p>

<div id="turn-banner" class="other-turn">
    <span id="turn-text">กำลังโหลด...</span>
</div>

<div id="bullet-bar">
    <span class="bullet-label">🔴 กระสุน</span>
    <div id="bullets-display"></div>
    <span class="bullet-maxinfo" id="bullet-maxinfo"></span>
</div>

<div class="battle-wrap">
    <!-- MY BOARD -->
    <div class="board-section">
        <div class="board-title">🛡 กระดานของคุณ</div>
        <div class="board-wrapper">
            <div id="own-board" class="grid"></div>
        </div>
    </div>

    <!-- TARGET BOARD -->
    <div class="board-section">
        <div class="board-title" id="target-label">🎯 เลือกเป้าหมายก่อน</div>
        <div class="board-wrapper target-board" id="target-board-wrap">
            <div id="target-board" class="grid"></div>
        </div>
    </div>

    <!-- SIDE PANEL -->
    <div class="side-panel">
        <!-- Target Selector -->
        <div class="panel-card">
            <h3>🎯 เลือกเป้าหมาย</h3>
            <div id="target-selector"></div>
        </div>

        <!-- Player Status -->
        <div class="panel-card">
            <h3>👥 สถานะผู้เล่น</h3>
            <div id="player-status-list"></div>
        </div>

        <!-- Battle Log -->
        <div class="panel-card">
            <h3>📋 บันทึกการสู้</h3>
            <div id="log-entries"></div>
        </div>

        <button class="btn btn-danger" onclick="forfeit()">🏳 ยอมแพ้</button>
        <button class="btn btn-endturn" id="end-turn-btn" onclick="endTurn()" style="display:none">⏭ จบเทิร์น (สละกระสุน)</button>
        <button class="btn btn-secondary" onclick="window.location.href='lobby.html'">← กลับ Lobby</button>
    </div>
</div>

<div id="toast"></div>

<div id="game-over-overlay">
    <div class="game-over-box">
        <h2 id="go-title">🏆</h2>
        <p id="go-msg"></p>
        <button class="btn-home" onclick="window.location.href='lobby.html'">กลับ Lobby</button>
    </div>
</div>

<script>
const ROWS=6,COLS=8,rowLabels=['A','B','C','D','E','F'];
const p=new URLSearchParams(window.location.search);
const currentRoomCode=p.get('room');
const myId=p.get('player');

let isMyTurn=false;
let gameOver=false;
let selectedTargetId=null;
let players=[]; // {socketId,name,color,alive,maxBullets}
let socket=null;
let bulletsLeft=1;
let myMaxBullets=1;

const targetBoards={};

// ─── BULLET DISPLAY ──────────────────────────────────────────
function renderBullets(left, max){
    const disp=document.getElementById('bullets-display');
    const info=document.getElementById('bullet-maxinfo');
    disp.innerHTML='';
    for(let i=0;i<max;i++){
        const s=document.createElement('span');
        s.className='bullet-icon'+(i>=left?' spent':'');
        s.textContent='🔴';
        disp.appendChild(s);
    }
    info.textContent=`${left}/${max}`;
}

// ─── BOARD BUILDERS ─────────────────────────────────────────
function buildGrid(elementId, isOwn){
    const el=document.getElementById(elementId);
    el.innerHTML='';
    el.appendChild(mkCell('','header-cell'));
    for(let i=1;i<=COLS;i++) el.appendChild(mkCell(i,'header-cell top-header'));
    for(let r=0;r<ROWS;r++){
        el.appendChild(mkCell(rowLabels[r],'header-cell'));
        for(let c=1;c<=COLS;c++){
            const cell=mkCell('','cell');
            cell.dataset.row=r; cell.dataset.col=c;
            if(!isOwn) cell.onclick=()=>handleAttack(r,c);
            el.appendChild(cell);
        }
    }
}
function mkCell(content,className){
    const d=document.createElement('div');
    d.className=className;
    if(content!=='')d.innerText=content;
    return d;
}
function getOwnCell(r,c){ return document.querySelector(`#own-board .cell[data-row="${r}"][data-col="${c}"]`); }
function getTargetCell(r,c){ return document.querySelector(`#target-board .cell[data-row="${r}"][data-col="${c}"]`); }

// ─── TARGET SELECTION ────────────────────────────────────────
function buildTargetBoards(){
    players.forEach(pl=>{
        if(pl.socketId!==myId){
            if(!targetBoards[pl.socketId]) targetBoards[pl.socketId]={hit:new Set(),miss:new Set()};
        }
    });
}

function selectTarget(targetId){
    if(!players.find(p=>p.socketId===targetId)?.alive) return;
    selectedTargetId=targetId;
    // Update selector UI
    document.querySelectorAll('.target-btn').forEach(b=>b.classList.remove('selected'));
    document.getElementById(`tbtn-${targetId}`)?.classList.add('selected');
    // Reload target board
    buildGrid('target-board',false);
    const tb=targetBoards[targetId]||{hit:new Set(),miss:new Set()};
    tb.hit.forEach(key=>{ const[r,c]=key.split(','); const cell=getTargetCell(r,c); if(cell){cell.classList.add('hit');} });
    tb.miss.forEach(key=>{ const[r,c]=key.split(','); const cell=getTargetCell(r,c); if(cell){cell.classList.add('miss');} });
    const target=players.find(p=>p.socketId===targetId);
    document.getElementById('target-label').textContent=`🎯 กระดาน: ${target?.name||''}`;
    document.getElementById('target-board-wrap').classList.toggle('active',isMyTurn);
}

function renderTargetSelector(){
    const sel=document.getElementById('target-selector');
    sel.innerHTML=players.filter(p=>p.socketId!==myId).map(pl=>`
        <button class="target-btn ${pl.socketId===selectedTargetId?'selected':''} ${!pl.alive?'eliminated':''}"
            id="tbtn-${pl.socketId}"
            onclick="${pl.alive?`selectTarget('${pl.socketId}')`:''}">
            <div class="target-dot" style="background:${pl.color}"></div>
            ${pl.name}${!pl.alive?' ☠':''}
        </button>`).join('');
}

function renderPlayerStatus(){
    const list=document.getElementById('player-status-list');
    list.innerHTML=players.map(pl=>`
        <div class="player-status-row">
            <div class="pdot" style="background:${pl.color}"></div>
            <span class="pname ${!pl.alive?'pelim':''}">${pl.name}${pl.socketId===myId?' (คุณ)':''}</span>
            <span style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:#e67e22" title="กระสุนต่อเทิร์น">🔴×${pl.maxBullets||1}</span>
        </div>`).join('');
}

// ─── TURN BANNER ─────────────────────────────────────────────
function updateTurnBanner(currentTurnId, currentPlayerName, bLeft, bMax){
    const banner=document.getElementById('turn-banner');
    const txt=document.getElementById('turn-text');
    if(gameOver) return;
    const isMe = currentTurnId===myId || currentTurnId===socket?.id;
    if(isMe){
        isMyTurn=true;
        bulletsLeft = bLeft != null ? bLeft : bulletsLeft;
        const max = bMax != null ? bMax : myMaxBullets;
        myMaxBullets = max;
        txt.textContent=`⚔ ตาของคุณ! เหลือ ${bulletsLeft} กระสุน`;
        banner.className='turn-banner my-turn';
        renderBullets(bulletsLeft, myMaxBullets);
    } else {
        isMyTurn=false;
        const bInfo = bLeft!=null ? ` (${bLeft} กระสุน)` : '';
        txt.textContent=`⏳ รอ ${currentPlayerName||'ผู้เล่นอื่น'}${bInfo}...`;
        banner.className='turn-banner other-turn';
        // show other player's bullets count dimmed
        if(bLeft!=null && bMax!=null) renderBullets(bLeft, bMax);
    }
    document.getElementById('target-board-wrap').classList.toggle('active',isMyTurn);
}

// ─── ATTACK ──────────────────────────────────────────────────
function handleAttack(r,c){
    if(!isMyTurn||gameOver){showToast('ยังไม่ถึงตาคุณ!');return;}
    if(!selectedTargetId){showToast('เลือกเป้าหมายก่อน!');return;}
    const cell=getTargetCell(r,c);
    if(cell.classList.contains('hit')||cell.classList.contains('miss')){showToast('โจมตีช่องนี้ไปแล้ว!');return;}
    socket.emit('attack',{roomCode:currentRoomCode,targetId:selectedTargetId,row:r,col:c});
}

// ─── LOG ─────────────────────────────────────────────────────
function addLog(msg,type='info'){
    const log=document.getElementById('log-entries');
    const div=document.createElement('div');
    div.className=`log-${type}`;
    div.textContent=`${new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})} ${msg}`;
    log.insertBefore(div,log.firstChild);
}

// ─── SOCKET ──────────────────────────────────────────────────
function initSocket(){
    socket=io();

    socket.on('battlePhaseStart',(data)=>{
        players=data.players;
        const me=players.find(p=>p.socketId===myId||p.socketId===socket?.id);
        myMaxBullets=me?.maxBullets||4;
        bulletsLeft=data.bulletsLeft||4;
        buildTargetBoards();
        renderTargetSelector();
        renderPlayerStatus();
        const firstPlayer=players.find(p=>p.socketId===data.firstPlayerId);
        updateTurnBanner(data.firstPlayerId,firstPlayer?.name,bulletsLeft,firstPlayer?.maxBullets||4);
        // Auto-select first alive opponent
        const first=players.find(p=>p.socketId!==myId&&p.socketId!==socket?.id&&p.alive);
        if(first) selectTarget(first.socketId);
        addLog('— เกมเริ่มแล้ว! ตาของ '+(firstPlayer?.name||'?'),'info');
    });

    socket.on('roomState',(data)=>{
        players=data.players||players;
        renderPlayerStatus();
        renderTargetSelector();
    });

    socket.on('attackResult',(data)=>{
        const {attackerId,targetId,row,col,hit,sunk,what,refund,bulletsLeft:bLeft,eliminated}=data;
        const key=`${row},${col}`;
        const amAttacker = attackerId===myId||attackerId===socket?.id;
        const amTarget   = targetId===myId||targetId===socket?.id;

        // Store in target board maps
        if(!targetBoards[targetId]) targetBoards[targetId]={hit:new Set(),miss:new Set()};
        if(hit) targetBoards[targetId].hit.add(key);
        else    targetBoards[targetId].miss.add(key);

        // Update target board display (if currently viewing this target)
        if(targetId===selectedTargetId){
            const cell=getTargetCell(row,col);
            if(cell) cell.classList.add(hit?'hit':'miss');
        }

        // Update own board display
        if(amTarget){
            const cell=getOwnCell(row,col);
            if(cell) cell.classList.add(hit?'hit':'miss');
        }

        // ── Log rules ──────────────────────────────────────────
        // - Everyone sees attacker+target name, row/col, hit/miss
        // - "what" is hidden from 3rd parties; only attacker & target know detail
        // - Sunk ship → everyone hears
        const attName=players.find(p=>p.socketId===attackerId)?.name||'?';
        const tgtName=players.find(p=>p.socketId===targetId)?.name||'?';
        const coord=`${rowLabels[row]}${col}`;

        if(amAttacker||amTarget){
            // Full detail
            const detail = what==='water'?'น้ำ 💧':what==='land'?'ดิน 🏔 (คืนกระสุน)':what==='turret'?'ป้อมปืน! 🔫 (คืนกระสุน)':'เรือ! 💥';
            addLog(`${attName} → ${tgtName} ${coord}: ${hit?detail:'พลาด (น้ำ)'}`,hit?'hit':'miss');
        } else {
            // 3rd party sees: hit/miss only, no detail
            addLog(`${attName} → ${tgtName} ${coord}: ${hit?'โดน! 💥':'พลาด 💧'}`,hit?'hit':'miss');
        }

        if(sunk) addLog(`🚢 เรือของ ${tgtName} ล่มแล้ว!`,'sunk');

        // Refund notice (only attacker sees)
        if(amAttacker && refund){
            showToast('💠 คืนกระสุน! (โดนดิน/ป้อม)',true);
        }

        // Bullet update for attacker
        if(amAttacker && bLeft!=null){
            bulletsLeft=bLeft;
            document.getElementById('turn-text').textContent=`⚔ ตาของคุณ! เหลือ ${bulletsLeft} กระสุน`;
            renderBullets(bulletsLeft,myMaxBullets);
            showEndTurnBtn(true);
        }

        // Update player status (maxBullets may have changed if turret destroyed)
        if(what==='turret'){
            const tgtPlayer=players.find(p=>p.socketId===targetId);
            if(tgtPlayer&&tgtPlayer.maxBullets>1){
                tgtPlayer.maxBullets--;
                renderPlayerStatus();
                if(amTarget) showToast('💔 ป้อมปืนถูกทำลาย! กระสุนลดลง');
            }
        }
    });

    // Same turn — bullets left, keep going
    socket.on('turnContinue',(data)=>{
        const {currentTurn,currentPlayerName,bulletsLeft:bLeft,maxBullets:bMax}=data;
        updateTurnBanner(currentTurn,currentPlayerName,bLeft,bMax);
    });

    // New turn
    socket.on('turnUpdate',(data)=>{
        const {currentTurn,currentPlayerName,bulletsLeft:bLeft,maxBullets:bMax}=data;
        updateTurnBanner(currentTurn,currentPlayerName,bLeft,bMax);
        showEndTurnBtn(false);
        addLog(`— ตาของ ${currentPlayerName||'?'} (${bLeft} กระสุน)`,'info');

        // Update my maxBullets if it's now my turn
        const isMe=currentTurn===myId||currentTurn===socket?.id;
        if(isMe&&bMax!=null) myMaxBullets=bMax;
    });

    socket.on('playerEliminated',(data)=>{
        const pl=players.find(p=>p.socketId===data.eliminatedId);
        if(pl) pl.alive=false;
        renderPlayerStatus();
        renderTargetSelector();
        addLog(`☠ ${data.eliminatedName} ถูกกำจัด! (โดย ${data.eliminatedByName||'?'})`, 'elim');
        if(data.eliminatedId===myId||data.eliminatedId===socket?.id){
            isMyTurn=false;
            showEndTurnBtn(false);
            showToast('คุณถูกกำจัดแล้ว ดูการสู้ต่อได้เลย');
        }
        // Auto-switch target if eliminated target
        if(data.eliminatedId===selectedTargetId){
            const next=players.find(p=>p.socketId!==myId&&p.socketId!==socket?.id&&p.alive);
            if(next) selectTarget(next.socketId);
        }
    });

    socket.on('playerDisconnected',(data)=>{
        addLog(`${data.playerName} หลุดจากเกม`,'info');
    });

    socket.on('gameOver',(data)=>{
        gameOver=true;
        isMyTurn=false;
        showEndTurnBtn(false);
        const isWinner=data.winnerId===myId||data.winnerId===socket?.id;
        const goTitle=document.getElementById('go-title');
        const goMsg=document.getElementById('go-msg');
        if(!data.winnerId){
            goTitle.textContent='🤝 เสมอ!'; goMsg.textContent='ไม่มีผู้ชนะในครั้งนี้';
        } else if(isWinner){
            goTitle.textContent='🏆 คุณชนะ!'; goMsg.textContent='ยอดเยี่ยม! คุณเป็นผู้รอดชีวิตคนเดียว!';
        } else {
            goTitle.textContent='💀 แพ้แล้ว'; goMsg.textContent=`${data.winnerName} ชนะการต่อสู้ครั้งนี้`;
        }
        document.getElementById('game-over-overlay').classList.add('show');
    });

    socket.on('error',(data)=>showToast(data.message));
}

function showEndTurnBtn(show){
    const btn=document.getElementById('end-turn-btn');
    if(btn) btn.style.display=show&&isMyTurn?'block':'none';
}

function endTurn(){
    if(!isMyTurn||gameOver) return;
    socket.emit('endTurn',{roomCode:currentRoomCode});
    isMyTurn=false;
    showEndTurnBtn(false);
}

function forfeit(){
    if(gameOver) return;
    if(!confirm('ยืนยันยอมแพ้?')) return;
    socket.emit('forfeit',{roomCode:currentRoomCode});
    gameOver=true;
    isMyTurn=false;
    showEndTurnBtn(false);
}

function showToast(msg,success=false){
    const t=document.getElementById('toast');
    t.textContent=msg; t.className=success?'success':'';
    t.style.display='block';
    setTimeout(()=>t.style.display='none',3000);
}

// ─── INIT ────────────────────────────────────────────────────
buildGrid('own-board',true);
buildGrid('target-board',false);
if(!currentRoomCode){ document.getElementById('turn-banner').textContent='⚠ ไม่พบห้อง'; }
else { initSocket(); }
</script>
</body>
</html>
